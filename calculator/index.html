<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
  <!-- Theme Toggle Button -->
  <button class="btn btn-outline-secondary theme-toggle-btn" id="theme-toggle" onclick="toggleTheme()"
    title="Toggle dark/light mode">
    🌙
  </button>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6 col-md-6 col-sm-8">
        <div class="border border-dotted border-3 rounded-3 p-3 mb-4 bg-white bg-opacity-50">
          <h4 class="text-center group-header mb-0">VUNA CALCULATOR</h4>
          <p class="text-center text-small text-muted">
            <i>Created by set 2025/26 Software Engineering</i>
          </p>
        </div>
        <div class="row">
          <div class="col-md-12">
            <div class="card calculator-card">
              <div class="card-body p-4">
                <div class="calculator">
                  <div class="display-container">
                    <input type="text" class="form-control" id="result" placeholder="0" disabled />
                  </div>

                  <div class="btn-grid">
                    <button class="btn btn-light" onclick="bracketToResult('(')">(</button>
                    <button class="btn btn-light" onclick="bracketToResult(')')">)</button>
                    <button class="btn btn-light" onclick="backspace()">←</button>

                    <!-- Row trig -->
                    <button class="btn btn-action" onclick="clearResult()">AC</button>

                    <!-- Row 2 -->
                    <button class="btn btn-light" onclick="appendToResult(7)">7</button>
                    <button class="btn btn-light" onclick="appendToResult(8)">8</button>
                    <button class="btn btn-light" onclick="appendToResult(9)">9</button>

                    <!-- Row 3 -->
                    <button class="btn btn-operator" onclick="operatorToResult('/')">÷</button>
                    <button class="btn btn-light" onclick="appendToResult(4)">4</button>
                    <button class="btn btn-light" onclick="appendToResult(5)">5</button>
                    <button class="btn btn-light" onclick="appendToResult(6)">6</button>

                    <!-- Row 4 -->
                    <button class="btn btn-operator" onclick="operatorToResult('*')">×</button>
                    <button class="btn btn-light" onclick="appendToResult(1)">1</button>
                    <button class="btn btn-light" onclick="appendToResult(2)">2</button>
                    <button class="btn btn-light" onclick="appendToResult(3)">3</button>

                    <!-- Row 5 -->
                    <button class="btn btn-operator" onclick="operatorToResult('+')">+</button>
                    <button class="btn btn-light" onclick="appendToResult('.')">.</button>
                    <button class="btn btn-light" onclick="appendToResult(0)">0</button>
                    <button class="btn btn-operator" onclick="percentToResult('%')">%</button>
                    
                    <!-- Row 9 -->
                    <button class="btn btn-operator" onclick="operatorToResult('-')">−</button>

                    <button class="btn btn-equals" onclick="calculateResult()" style="grid-column: span 4;">=</button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <script src="assets/js/bootstrap.min.js"></script>
          <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
          <script src="assets/js/script.js"></script>
          <!-- ─── BETTING ODDS CALCULATOR ─── -->
          <div class="col-lg-6 col-md-6 col-sm-8 mt-4">
            <div class="border border-dotted border-3 rounded-3 p-3 mb-4 bg-white bg-opacity-50">
              <h4 class="text-center group-header mb-0">BETTING ODDS CALCULATOR</h4>
              <p class="text-center text-small text-muted">
                <i>Convert odds & calculate winnings</i>
              </p>
            </div>
            <div class="card calculator-card">
              <div class="card-body p-4">
                <div class="odds-section">
                  <label class="section-title">Odds Format</label>
                  <div class="odds-format-toggle">
                    <button class="odds-format-btn active" onclick="setOddsFormat('fractional')">Fractional</button>
                    <button class="odds-format-btn" onclick="setOddsFormat('decimal')">Decimal</button>
                    <button class="odds-format-btn" onclick="setOddsFormat('moneyline')">Moneyline</button>
                  </div>

                  <div class="odds-input-group" id="fractional-inputs">
                    <div class="odds-input-pair">
                      <input type="number" id="frac-num" class="form-control" placeholder="Numerator" min="0" oninput="calculateOdds()">
                      <span class="odds-separator">/</span>
                      <input type="number" id="frac-den" class="form-control" placeholder="Denominator" min="1" oninput="calculateOdds()">
                    </div>
                  </div>

                  <div class="odds-input-group" id="decimal-inputs" style="display:none">
                    <input type="number" id="dec-val" class="form-control" placeholder="Decimal odds (e.g. 3.50)" min="1.01" step="0.01" oninput="calculateOdds()">
                  </div>

                  <div class="odds-input-group" id="moneyline-inputs" style="display:none">
                    <input type="number" id="ml-val" class="form-control" placeholder="Moneyline (e.g. +150 or -110)" step="1" oninput="calculateOdds()">
                  </div>

                  <div class="stake-input-group">
                    <label class="section-title">Stake ($)</label>
                    <input type="number" id="stake-val" class="form-control" placeholder="10.00" min="0.01" step="0.01" oninput="calculateOdds()">
                  </div>

                  <div class="odds-results" id="odds-results">
                    <div class="odds-result-row">
                      <span class="odds-result-label">Fractional</span>
                      <span class="odds-result-value" id="res-fractional">—</span>
                    </div>
                    <div class="odds-result-row">
                      <span class="odds-result-label">Decimal</span>
                      <span class="odds-result-value" id="res-decimal">—</span>
                    </div>
                    <div class="odds-result-row">
                      <span class="odds-result-label">Moneyline</span>
                      <span class="odds-result-value" id="res-moneyline">—</span>
                    </div>
                    <div class="odds-result-row">
                      <span class="odds-result-label">Implied Probability</span>
                      <span class="odds-result-value" id="res-probability">—</span>
                    </div>
                    <div class="odds-result-row highlight">
                      <span class="odds-result-label">Potential Return</span>
                      <span class="odds-result-value" id="res-return">—</span>
                    </div>
                    <div class="odds-result-row highlight">
                      <span class="odds-result-label">Profit</span>
                      <span class="odds-result-value" id="res-profit">—</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <script src="assets/js/odds.js"></script>
          <button id="scroll-to-calculator" title="Back to Calculator">↑</button>
        </div>
      </div>
</body>

</html>
